<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<title>Shirley Electric — Safety Evaluation</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --orange: #e8520a; --orange-light: #fff0e8; --navy: #1a2a4a;
    --green: #1e7e34; --green-light: #d4edda; --green-btn: #28a745; --green-dark: #155724;
    --yellow: #856404; --yellow-light: #fff3cd; --yellow-btn: #ffc107; --yellow-dark: #533f03;
    --red: #721c24; --red-light: #f8d7da; --red-btn: #dc3545; --red-dark: #491217;
    --blue: #1a6fbd; --blue-light: #e8f1fb; --blue-mid: #4a90d9;
    --gray0: #f5f6f8; --gray1: #e8eaed; --gray2: #d1d5db; --gray3: #9ca3af;
    --gray4: #6b7280; --gray5: #374151; --gray6: #1f2937;
    --radius: 12px; --radius-sm: 8px;
    --font: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
  }
  html { font-family: var(--font); background: var(--gray0); color: var(--gray6); }
  body { min-height: 100vh; }

  /* TOPBAR */
  .topbar { background: var(--navy); color: white; padding: 14px 16px 12px; position: sticky; top: 0; z-index: 100; }
  .topbar-inner { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .topbar-brand { display: flex; align-items: center; gap: 10px; }
  .brand-text h1 { font-size: 15px; font-weight: 700; line-height: 1.2; }
  .brand-text p { font-size: 11px; opacity: 0.7; margin-top: 1px; }
  .score-pill { background: rgba(255,255,255,0.15); border-radius: 999px; padding: 5px 12px; font-size: 13px; font-weight: 700; white-space: nowrap; flex-shrink: 0; }

  /* SCORE BAR */
  .score-bar-wrap { background: white; border-bottom: 1px solid var(--gray1); padding: 12px 14px; }
  .score-stats { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-bottom: 8px; }
  .stat { text-align: center; border-radius: var(--radius-sm); padding: 7px 3px; }
  .stat-num { font-size: 19px; font-weight: 700; line-height: 1; }
  .stat-lbl { font-size: 9px; margin-top: 2px; text-transform: uppercase; letter-spacing: 0.4px; font-weight: 700; }
  .stat-green { background: var(--green-light); } .stat-green .stat-num { color: var(--green-dark); } .stat-green .stat-lbl { color: var(--green); }
  .stat-yellow { background: var(--yellow-light); } .stat-yellow .stat-num { color: var(--yellow-dark); } .stat-yellow .stat-lbl { color: var(--yellow); }
  .stat-red { background: var(--red-light); } .stat-red .stat-num { color: var(--red-dark); } .stat-red .stat-lbl { color: var(--red); }
  .stat-na { background: var(--blue-light); } .stat-na .stat-num { color: #0d4a8a; } .stat-na .stat-lbl { color: var(--blue); }
  .stat-pct { background: var(--gray0); } .stat-pct .stat-num { color: var(--gray6); } .stat-pct .stat-lbl { color: var(--gray4); }
  .track { height: 7px; background: var(--gray1); border-radius: 999px; overflow: hidden; display: flex; }
  .bar-green { background: var(--green-btn); transition: width 0.3s; }
  .bar-yellow { background: var(--yellow-btn); transition: width 0.3s; }
  .bar-red { background: var(--red-btn); transition: width 0.3s; }
  .bar-na { background: var(--blue-mid); transition: width 0.3s; }
  .rating { margin-top: 8px; padding: 9px 12px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; display: none; align-items: center; gap: 7px; }
  .rating.safe { background: var(--green-light); color: var(--green-dark); display: flex; }
  .rating.caution { background: var(--yellow-light); color: var(--yellow-dark); display: flex; }
  .rating.danger { background: var(--red-light); color: var(--red-dark); display: flex; }

  /* TABS */
  .tabs-wrap { background: white; border-bottom: 1px solid var(--gray1); overflow-x: auto; -webkit-overflow-scrolling: touch; white-space: nowrap; padding: 0 6px; position: sticky; top: 68px; z-index: 90; display: flex; }
  .tab { display: inline-flex; align-items: center; gap: 4px; padding: 11px 10px; font-size: 12px; font-weight: 600; color: var(--gray4); border-bottom: 3px solid transparent; cursor: pointer; white-space: nowrap; background: none; border-top: none; border-left: none; border-right: none; font-family: var(--font); }
  .tab.active { color: var(--orange); border-bottom-color: var(--orange); }
  .tab-badge { background: var(--gray1); color: var(--gray5); border-radius: 999px; padding: 1px 6px; font-size: 10px; font-weight: 700; }
  .tab.active .tab-badge { background: var(--orange-light); color: var(--orange); }

  /* PAGES */
  .page { display: none; padding: 12px; }
  .page.active { display: block; }
  .card { background: white; border-radius: var(--radius); padding: 14px; margin-bottom: 10px; border: 1px solid var(--gray1); }
  .card-title { font-size: 11px; font-weight: 700; color: var(--gray4); text-transform: uppercase; letter-spacing: 0.7px; margin-bottom: 12px; }
  .field { margin-bottom: 10px; } .field:last-child { margin-bottom: 0; }
  .field label { font-size: 13px; color: var(--gray5); font-weight: 500; display: block; margin-bottom: 4px; }
  .field label span { color: var(--red-btn); }
  .field input, .field select, .field textarea { width: 100%; padding: 12px 13px; font-size: 16px; border: 1.5px solid var(--gray2); border-radius: var(--radius-sm); background: white; color: var(--gray6); font-family: var(--font); appearance: none; -webkit-appearance: none; }
  .field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: var(--orange); }
  .field textarea { min-height: 75px; resize: vertical; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  /* LEGEND */
  .legend { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; background: white; border-radius: var(--radius-sm); padding: 9px 11px; border: 1px solid var(--gray1); }
  .legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; color: var(--gray5); }
  .legend-dot { width: 13px; height: 13px; border-radius: 3px; flex-shrink: 0; }

  /* CHECK ITEMS */
  .check-item { background: white; border-radius: var(--radius); margin-bottom: 8px; border: 2px solid var(--gray1); overflow: hidden; transition: border-color 0.15s; }
  .check-item.is-green { border-color: var(--green-btn); }
  .check-item.is-yellow { border-color: var(--yellow-btn); }
  .check-item.is-red { border-color: var(--red-btn); }
  .check-item.is-na { border-color: var(--blue-mid); }
  .status-strip { height: 4px; }
  .status-strip.c-green { background: var(--green-btn); }
  .status-strip.c-yellow { background: var(--yellow-btn); }
  .status-strip.c-red { background: var(--red-btn); }
  .status-strip.c-na { background: var(--blue-mid); }
  .check-top { padding: 11px 13px 9px; }
  .check-label { font-size: 14px; font-weight: 600; color: var(--gray6); line-height: 1.3; }
  .check-btns { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; border-top: 1px solid var(--gray1); }
  .chk-btn { padding: 0; height: 58px; font-size: 12px; font-weight: 700; background: white; border: none; cursor: pointer; font-family: var(--font); color: var(--gray3); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; -webkit-tap-highlight-color: transparent; }
  .chk-btn:not(:last-child) { border-right: 1px solid var(--gray1); }
  .chk-btn svg { width: 22px; height: 22px; flex-shrink: 0; }
  .chk-btn span { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
  .chk-btn.green { color: #9dc8a8; } .chk-btn.green.active { background: var(--green-btn); color: white; }
  .chk-btn.yellow { color: #d4b86a; } .chk-btn.yellow.active { background: var(--yellow-btn); color: var(--yellow-dark); }
  .chk-btn.red { color: #e8a0a6; } .chk-btn.red.active { background: var(--red-btn); color: white; }
  .chk-btn.na { color: #90b8e0; } .chk-btn.na.active { background: var(--blue-mid); color: white; }
  .issue-note { margin: 0 12px 10px; display: none; }
  .issue-note.visible { display: block; }
  .issue-note textarea { width: 100%; padding: 9px 11px; font-size: 14px; border-radius: var(--radius-sm); background: #fff8e1; color: var(--gray6); font-family: var(--font); resize: vertical; min-height: 52px; border: 1.5px solid var(--yellow-btn); }
  .issue-note.red-note textarea { background: var(--red-light); border-color: var(--red-btn); }

  /* SIGN OFF */
  .sig-wrap { border: 1.5px solid var(--gray2); border-radius: var(--radius-sm); margin-top: 6px; position: relative; background: white; overflow: hidden; }
  .sig-wrap canvas { display: block; touch-action: none; cursor: crosshair; }
  .sig-clear { position: absolute; top: 7px; right: 7px; background: var(--gray1); border: none; border-radius: 6px; padding: 5px 10px; font-size: 12px; color: var(--gray5); cursor: pointer; font-family: var(--font); z-index: 10; }
  .sig-placeholder { position: absolute; bottom: 8px; left: 12px; font-size: 12px; color: var(--gray3); pointer-events: none; font-style: italic; }

  /* DISCLAIMER */
  .disclaimer { background: var(--gray0); border: 1px solid var(--gray1); border-radius: var(--radius-sm); padding: 12px; font-size: 11px; color: var(--gray4); line-height: 1.6; margin-bottom: 12px; }
  .disclaimer strong { color: var(--gray5); }

  /* BUTTONS */
  .action-bar { padding: 12px; padding-bottom: 40px; display: flex; flex-direction: column; gap: 10px; }
  .btn-main { background: var(--orange); color: white; border: none; border-radius: var(--radius); padding: 16px; font-size: 16px; font-weight: 700; font-family: var(--font); cursor: pointer; }
  .btn-navy { background: var(--navy); color: white; border: none; border-radius: var(--radius); padding: 16px; font-size: 16px; font-weight: 700; font-family: var(--font); cursor: pointer; }
  .btn-sec { background: white; color: var(--gray5); border: 1.5px solid var(--gray2); border-radius: var(--radius); padding: 14px; font-size: 15px; font-weight: 600; font-family: var(--font); cursor: pointer; }

  @media print {
    .topbar, .tabs-wrap, .action-bar { display: none !important; }
    .page { display: block !important; }
    body { background: white; }
    .check-item, .card { break-inside: avoid; }
  }
</style>
</head>

</div>

<div style="background:#e8520a;padding:6px 16px;display:flex;justify-content:space-between;align-items:center;">
  <span style="color:white;font-size:12px;font-weight:600;">📞 (512) 376-6667</span>

</div>
<div class="score-bar-wrap">

<div class="tabs-wrap" id="tabs-wrap"></div>

<script>
const svgCheck=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
const svgWarn=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`;
const svgX=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;
const svgNA=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>`;

const SECTIONS = [
  { id:"info", label:"Job Info", icon:"📋", items:null },
  { id:"panel_in", label:"Panel Indoor", icon:"⚡", items:[
    { id:"pi1", label:"Is there any sign of water damage?" },
    { id:"pi2", label:"Is the panel at its capacity?" },
    { id:"pi3", label:"Are the breakers matching the panel type?" },
    { id:"pi4", label:"Are there double tapped breakers?" },
    { id:"pi5", label:"Are there multiple wires under the same terminal?" },
    { id:"pi6", label:"Are all holes closed on the panel enclosure?" },
    { id:"pi7", label:"Thermal scan?" },
  ]},
  { id:"panel_out", label:"Panel Outdoor", icon:"🔌", items:[
    { id:"po1", label:"Is there any sign of water damage?" },
    { id:"po2", label:"Is the panel at its capacity?" },
    { id:"po3", label:"Are the breakers matching the panel type?" },
    { id:"po4", label:"Are there double tapped breakers?" },
    { id:"po5", label:"Are there multiple wires under the same terminal?" },
    { id:"po6", label:"Are all holes closed on the panel enclosure?" },
    { id:"po7", label:"Is proper grounding in place to water main and gas piping (if applicable)?" },
    { id:"po8", label:"Are there ground rods installed?" },
    { id:"po9", label:"Is surge protection present?" },

  ]},
  { id:"service", label:"Service", icon:"🔧", items:[
    { id:"sv1", label:"Is there any visual sign of water damage?" },
    { id:"sv2", label:"Is the service securely fastened?" },
  ]},
  { id:"gfci", label:"GFCIs", icon:"🛡️", items:[
    { id:"g1", label:"Are all kitchen counter receptacles GFCI protected?" },
    { id:"g2", label:"Are all receptacles in the bathroom(s) GFCI protected?" },
    { id:"g3", label:"Are the garage receptacles GFCI protected?" },
    { id:"g4", label:"Is the washing machine receptacle GFCI protected?" },
    { id:"g5", label:"Are all outdoor receptacles GFCI protected and have in-use covers?" },
    { id:"g6", label:"Are there GFCI receptacles in unfinished areas?" },
  ]},
  { id:"receptacles", label:"Receptacles", icon:"🔋", items:[
    { id:"r1", label:"Are all receptacles / switches that are visible up to current code?" },
    { id:"r2", label:"Are faceplates installed and not damaged?" },
  ]},
  { id:"smoke", label:"Smoke/CO", icon:"🚨", items:[
    { id:"s1", label:"Is there a smoke detector installed in each bedroom?" },
    { id:"s2", label:"Is there a carbon monoxide detector installed outside of the bedrooms and 1 on each level?" },
  ]},
  { id:"notes", label:"Notes & Sign-off", icon:"📝", items:null },
];

const state = {};
let activeTab = "info";
const TOTAL = SECTIONS.filter(s=>s.items).reduce((a,s)=>a+s.items.length, 0);

function buildTabs() {
  const wrap = document.getElementById("tabs-wrap");
  SECTIONS.forEach(sec => {
    const btn = document.createElement("button");
    btn.className = "tab" + (sec.id===activeTab?" active":"");
    btn.id = "tab-"+sec.id;
    const count = sec.items ? `<span class="tab-badge" id="tbadge-${sec.id}">0/${sec.items.length}</span>` : "";
    btn.innerHTML = `${sec.icon} ${sec.label} ${count}`;
    btn.onclick = () => switchTab(sec.id);
    wrap.appendChild(btn);
  });
}

function switchTab(id) {
  activeTab = id;
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.getElementById("tab-"+id).classList.add("active");
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById("page-"+id).classList.add("active");
  document.getElementById("tab-"+id).scrollIntoView({behavior:"smooth",block:"nearest",inline:"center"});
}

function buildPages() {
  const wrap = document.getElementById("pages-wrap");
  SECTIONS.forEach(sec => {
    const page = document.createElement("div");
    page.className = "page" + (sec.id===activeTab?" active":"");
    page.id = "page-"+sec.id;
    if (sec.id==="info") page.innerHTML = buildInfoPage();
    else if (sec.id==="notes") page.innerHTML = buildNotesPage();
    else {
      page.innerHTML = `
        <div class="legend">
          <div class="legend-item"><div class="legend-dot" style="background:#28a745;"></div>Pass</div>
          <div class="legend-item"><div class="legend-dot" style="background:#ffc107;"></div>Attn — needs attention</div>
          <div class="legend-item"><div class="legend-dot" style="background:#dc3545;"></div>Fail</div>
          <div class="legend-item"><div class="legend-dot" style="background:#4a90d9;"></div>N/A</div>
        </div>
        ${sec.items.map(item=>buildCheckItem(item)).join("")}
        <div style="height:14px;"></div>`;
    }
    wrap.appendChild(page);
  });
  initSignatures();
}

function buildCheckItem(item) {
  return `<div class="check-item" id="item-${item.id}">
    <div class="status-strip" id="strip-${item.id}"></div>
    <div class="check-top">
      <div class="check-label">${item.label}</div>
    </div>
    <div class="check-btns">
      <button class="chk-btn green" id="green-${item.id}" ontouchend="hc(event,'${item.id}','green')" onclick="hc(event,'${item.id}','green')">${svgCheck}<span>Pass</span></button>
      <button class="chk-btn yellow" id="yellow-${item.id}" ontouchend="hc(event,'${item.id}','yellow')" onclick="hc(event,'${item.id}','yellow')">${svgWarn}<span>Attn</span></button>
      <button class="chk-btn red" id="red-${item.id}" ontouchend="hc(event,'${item.id}','red')" onclick="hc(event,'${item.id}','red')">${svgX}<span>Fail</span></button>
      <button class="chk-btn na" id="na-${item.id}" ontouchend="hc(event,'${item.id}','na')" onclick="hc(event,'${item.id}','na')">${svgNA}<span>N/A</span></button>
    </div>
    <div class="issue-note" id="note-wrap-${item.id}">
      <textarea id="note-${item.id}" placeholder="Add notes…"></textarea>
    </div>
  </div>`;
}

function buildInfoPage() {
  return `
  <div class="card">
    <div class="card-title">Job details</div>
    <div class="field"><label>Location / Address <span>*</span></label><input type="text" id="f-address" placeholder="212 Mulberry, Luling TX 78648" /></div>
    <div class="field-row">
      <div class="field"><label>Date <span>*</span></label><input type="date" id="f-date" /></div>
      <div class="field"><label>Invoice # <span>*</span></label><input type="text" id="f-invoice" placeholder="e.g. 3976" /></div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Technician</div>
    <div class="field"><label>Technician name <span>*</span></label><input type="text" id="f-name" placeholder="Full name" /></div>
    <div class="field-row">
      <div class="field"><label>License #</label><input type="text" id="f-license" placeholder="TECL 18096" value="TECL 18096" /></div>
      <div class="field"><label>Phone</label><input type="tel" id="f-phone" placeholder="(512) 376-6667" value="(512) 376-6667" /></div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Property</div>
    <div class="field"><label>Owner / contact name</label><input type="text" id="f-owner" placeholder="Homeowner name" /></div>
    <div class="field-row">
      <div class="field"><label>Property type</label>
        <select id="f-proptype">
          <option>Residential — single family</option>
          <option>Residential — multi-unit</option>
          <option>Commercial</option>
          <option>Industrial</option>
        </select>
      </div>
      <div class="field"><label>Year built</label><input type="text" id="f-year" placeholder="e.g. 1985" /></div>
    </div>
  </div>
  <div class="action-bar" style="padding-top:4px;">
    <button class="btn-main" onclick="switchTab('panel_in')">Start inspection →</button>
  </div>`;
}

function buildNotesPage() {
  return `
  <div class="card">
    <div class="card-title">Other / Visual hazards</div>
    <div class="field"><textarea id="f-hazards" placeholder="Exterior panel blocked by A/C unit, interior panel crimped splices not permitted, 1 20 amp breaker wire oversized, no grounds present…" style="min-height:100px;"></textarea></div>
  </div>
  <div class="card">
    <div class="card-title">Overall result</div>
    <button class="priority-btn p3" id="pri-3" onclick="setPriority(3)" style="padding:13px 14px;border-radius:8px;border:1.5px solid #d1d5db;background:white;font-size:14px;font-weight:500;color:#374151;cursor:pointer;margin-bottom:8px;display:block;width:100%;text-align:left;font-family:var(--font);">🚨  Critical — do not occupy / immediate repair required</button>
    <button class="priority-btn p2" id="pri-2" onclick="setPriority(2)" style="padding:13px 14px;border-radius:8px;border:1.5px solid #d1d5db;background:white;font-size:14px;font-weight:500;color:#374151;cursor:pointer;margin-bottom:8px;display:block;width:100%;text-align:left;font-family:var(--font);">🔶  Failures present — address within 7 days</button>
    <button class="priority-btn p1" id="pri-1" onclick="setPriority(1)" style="padding:13px 14px;border-radius:8px;border:1.5px solid #d1d5db;background:white;font-size:14px;font-weight:500;color:#374151;cursor:pointer;margin-bottom:8px;display:block;width:100%;text-align:left;font-family:var(--font);">⚠️  Attention items — address within 90 days</button>
    <button class="priority-btn p0" id="pri-0" onclick="setPriority(0)" style="padding:13px 14px;border-radius:8px;border:1.5px solid #d1d5db;background:white;font-size:14px;font-weight:500;color:#374151;cursor:pointer;margin-bottom:8px;display:block;width:100%;text-align:left;font-family:var(--font);">✅  No action required — passed inspection</button>
  </div>
  <div class="disclaimer">
    <strong>Shirley Electric Company</strong> is dedicated to ensuring your safety which is why we perform this <strong>FREE</strong> Visual Home Electrical Safety Evaluation. If any of the line items listed in this evaluation Fail, it is our recommendation that the proper repairs / corrections be made. The homeowner understands that safety hazards are not limited to the line items in this FREE Visual Home Electrical Safety Evaluation and not all potential electrical hazards are listed in this evaluation.<br/><br/>
    I have been informed of existing code violations and safety concerns, and if I choose not to have these violations or concerns repaired; I will hold Shirley Electric Company harmless and indemnify Shirley Electric Company from any damage or loss, including personal injuries which may occur as a result of not having repairs or corrections made.<br/><br/>
    <em>Suggestions are the Technician's professional opinion. Shirley Electric Company is not responsible for hazards not seen or detected.</em>
  </div>
  <div class="card">
    <div class="card-title">Signatures</div>
    <div class="field">
      <label>Homeowner signature and date</label>
      <div class="sig-wrap" id="wrap-sig-owner">
      <canvas id="sig-owner"></canvas>
      <button class="sig-clear" onclick="clearSig('sig-owner')">Clear</button>
      <span class="sig-placeholder">Sign here with finger or Apple Pencil</span>
    </div>
    </div>
    <div class="field" style="margin-top:12px;">
      <label>Technician signature and date</label>
      <div class="sig-wrap" id="wrap-sig-tech">
      <canvas id="sig-tech"></canvas>
      <button class="sig-clear" onclick="clearSig('sig-tech')">Clear</button>
      <span class="sig-placeholder">Sign here with finger or Apple Pencil</span>
    </div>
    </div>
    <div class="field-row" style="margin-top:10px;">
      <div class="field"><label>Homeowner — date</label><input type="date" /></div>
      <div class="field"><label>Technician — date</label><input type="date" /></div>
    </div>
  </div>
  <div class="action-bar">
    <button class="btn-main" onclick="window.print()">🖨️ Print / Save as PDF</button>
    <button class="btn-navy" onclick="exportData()">📤 Export summary (copy to clipboard)</button>
  </div>`;
}

const priStyles = [
  "background:#d4edda;border-color:#28a745;color:#155724;font-weight:700;",
  "background:#fff3cd;border-color:#ffc107;color:#533f03;font-weight:700;",
  "background:#ffe5b4;border-color:#e67e22;color:#7a3e00;font-weight:700;",
  "background:#f8d7da;border-color:#dc3545;color:#491217;font-weight:700;"
];
const priBase = "padding:13px 14px;border-radius:8px;border:1.5px solid;font-size:14px;font-weight:500;cursor:pointer;margin-bottom:8px;display:block;width:100%;text-align:left;font-family:var(--font);";
let activePri = -1;
function setPriority(idx) {
  if (activePri >= 0) {
    const old = document.getElementById("pri-"+activePri);
    if (old) old.style.cssText = priBase + "border-color:#d1d5db;background:white;color:#374151;font-weight:500;";
  }
  activePri = idx;
  const el = document.getElementById("pri-"+idx);
  if (el) el.style.cssText = priBase + priStyles[idx];
}

function hc(e, id, val) {
  e.preventDefault();
  state[id] = (state[id]===val) ? null : val;
  const v = state[id];
  ["green","yellow","red","na"].forEach(c => {
    const btn = document.getElementById(c+"-"+id);
    if (btn) btn.classList.toggle("active", v===c);
  });
  const item = document.getElementById("item-"+id);
  if (item) item.className = "check-item" + (v?" is-"+v:"");
  const strip = document.getElementById("strip-"+id);
  if (strip) strip.className = "status-strip" + (v?" c-"+v:"");
  const nw = document.getElementById("note-wrap-"+id);
  if (nw) {
    nw.style.display = (v==="yellow"||v==="red") ? "block" : "none";
    nw.className = "issue-note" + (v==="red"?" visible red-note":v==="yellow"?" visible":"");
  }
  updateScores();
}

function updateScores() {
  let g=0,y=0,r=0,na=0;
  SECTIONS.filter(s=>s.items).forEach(sec => {
    let sg=0,sy=0,sr=0,sna=0;
    sec.items.forEach(item => {
      const v = state[item.id];
      if(v==="green"){g++;sg++;}
      else if(v==="yellow"){y++;sy++;}
      else if(v==="red"){r++;sr++;}
      else if(v==="na"){na++;sna++;}
    });
    const done = sg+sy+sr+sna;
    const badge = document.getElementById("tbadge-"+sec.id);
    if (badge) badge.textContent = done+"/"+sec.items.length;
  });
  const total = g+y+r+na;
  const scored = g+y+r;
  document.getElementById("cnt-green").textContent = g;
  document.getElementById("cnt-yellow").textContent = y;
  document.getElementById("cnt-red").textContent = r;
  document.getElementById("cnt-na").textContent = na;
  document.getElementById("top-score").textContent = total+" / "+TOTAL;
  if (scored > 0) {
    const pct = Math.round(g/scored*100);
    document.getElementById("cnt-pct").textContent = pct+"%";
    document.getElementById("bar-green").style.width = (g/total*100)+"%";
    document.getElementById("bar-yellow").style.width = (y/total*100)+"%";
    document.getElementById("bar-red").style.width = (r/total*100)+"%";
    document.getElementById("bar-na").style.width = (na/total*100)+"%";
    const rat = document.getElementById("rating");
    if (r===0&&y===0) { rat.className="rating safe"; rat.innerHTML="✅ All items passed"; }
    else if (r===0) { rat.className="rating caution"; rat.innerHTML="⚠️ "+y+" item"+(y>1?"s":"")+" need attention"; }
    else { rat.className="rating danger"; rat.innerHTML="🚨 "+r+" failure"+(r>1?"s":"")+(y>0?", "+y+" attention item"+(y>1?"s":""):"")+" — repairs required"; }
  }
}

function initSignatures() {
  ["sig-owner","sig-tech"].forEach(function(id) {
    const wrap = document.getElementById("wrap-"+id);
    const canvas = document.getElementById(id);
    const placeholder = wrap ? wrap.querySelector(".sig-placeholder") : null;
    if (!canvas) return;

    function resize() {
      const w = wrap ? wrap.offsetWidth : canvas.offsetWidth;
      const h = 120;
      const dpr = window.devicePixelRatio || 1;
      canvas.style.width = w + "px";
      canvas.style.height = h + "px";
      canvas.width = Math.floor(w * dpr);
      canvas.height = Math.floor(h * dpr);
      const ctx = canvas.getContext("2d");
      ctx.scale(dpr, dpr);
      ctx.strokeStyle = "#1f2937";
      ctx.lineWidth = 2.5;
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
    }
    resize();

    let drawing = false;
    let lx = 0, ly = 0;
    let hasMark = false;

    function getCtx() {
      const ctx = canvas.getContext("2d");
      ctx.strokeStyle = "#1f2937";
      ctx.lineWidth = 2.5;
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      return ctx;
    }

    function getPos(e) {
      const r = canvas.getBoundingClientRect();
      const src = e.touches ? e.touches[0] : e;
      return { x: src.clientX - r.left, y: src.clientY - r.top };
    }

    function startDraw(e) {
      e.preventDefault();
      e.stopPropagation();
      drawing = true;
      const p = getPos(e);
      lx = p.x; ly = p.y;
      if (placeholder) placeholder.style.display = "none";
      hasMark = true;
    }

    function moveDraw(e) {
      e.preventDefault();
      e.stopPropagation();
      if (!drawing) return;
      const p = getPos(e);
      const ctx = getCtx();
      ctx.beginPath();
      ctx.moveTo(lx, ly);
      ctx.lineTo(p.x, p.y);
      ctx.stroke();
      lx = p.x; ly = p.y;
    }

    function endDraw(e) {
      e.preventDefault();
      drawing = false;
    }

    canvas.addEventListener("touchstart", startDraw, { passive: false });
    canvas.addEventListener("touchmove", moveDraw, { passive: false });
    canvas.addEventListener("touchend", endDraw, { passive: false });
    canvas.addEventListener("touchcancel", endDraw, { passive: false });
    canvas.addEventListener("mousedown", startDraw);
    canvas.addEventListener("mousemove", moveDraw);
    canvas.addEventListener("mouseup", endDraw);
    canvas.addEventListener("mouseleave", endDraw);

    window.addEventListener("resize", function() {
      if (!hasMark) resize();
    });
  });
}

function clearSig(id) {
  const canvas = document.getElementById(id);
  const wrap = document.getElementById("wrap-"+id);
  const placeholder = wrap ? wrap.querySelector(".sig-placeholder") : null;
  if (!canvas) return;
  const dpr = window.devicePixelRatio || 1;
  canvas.getContext("2d").clearRect(0, 0, canvas.width, canvas.height);
  if (placeholder) placeholder.style.display = "block";
}

function exportData() {
  const labels={green:"PASS",yellow:"ATTN",red:"FAIL",na:"N/A"};
  let out="SHIRLEY ELECTRIC — ELECTRICAL SAFETY EVALUATION\n================================================\n";
  const a=document.getElementById("f-address"); if(a&&a.value) out+="Location: "+a.value+"\n";
  const d=document.getElementById("f-date"); if(d&&d.value) out+="Date: "+d.value+"\n";
  const inv=document.getElementById("f-invoice"); if(inv&&inv.value) out+="Invoice #: "+inv.value+"\n";
  const nm=document.getElementById("f-name"); if(nm&&nm.value) out+="Technician: "+nm.value+"\n";
  out+="\n";
  SECTIONS.filter(s=>s.items).forEach(sec=>{
    out+=sec.label.toUpperCase()+"\n";
    sec.items.forEach(item=>{
      const v=state[item.id]; const tag=v?labels[v]:"—";
      const note=document.getElementById("note-"+item.id);
      const nv=note&&note.value?"\n     Note: "+note.value:"";
      out+="  ["+tag+"] "+item.label+nv+"\n";
    });
    out+="\n";
  });
  const hz=document.getElementById("f-hazards"); if(hz&&hz.value) out+="OTHER / VISUAL HAZARDS:\n"+hz.value+"\n";
  if(navigator.clipboard){navigator.clipboard.writeText(out).then(()=>alert("Copied to clipboard!")).catch(()=>alert(out));}else{alert(out);}
}

document.addEventListener("DOMContentLoaded",()=>{
  buildTabs(); buildPages();
  const d=document.getElementById("f-date"); if(d) d.valueAsDate=new Date();
});
</script>
